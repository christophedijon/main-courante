<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Content-Language" content="fr">
    <meta name="language" content="French">
    <meta name="description" content="Main Courante — Application de gestion sécurité">
    <title>Main Courante</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <!-- Theme color mobile -->
    <meta name="theme-color" content="#1a1c22">
    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Main Courante">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(reg => reg.unregister());
          if (regs.length > 0) window.location.reload();
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
